name: CI
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - run: npm ci
      - name: Build
        run: npm run build
      - name: Typecheck (incl. Eve backend contract)
        run: npx tsc --noEmit
# Note: runtime verification (scripts/verify-eve.mjs) needs a live TENKI_API_KEY
# and is run locally, not in CI, to avoid holding a credential in the workflow.
